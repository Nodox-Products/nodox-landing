<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cotización - Nodox Products</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 40px;
            color: #0B1A33;
            background: linear-gradient(135deg, #e8ebf2, #f7f9fc);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 25px;
            border-bottom: 3px solid #c7ccd6;
        }
        .logo img{
            width: 230px;
            filter: drop-shadow(0px 3px 6px rgba(0,0,0,0.15));
        }
        h1 {
            text-align: center;
            margin-top: 50px;
            color: #0B1A33;
            font-size: 36px;
            letter-spacing: 4px;
            font-weight: 700;
            text-shadow: 0px 1px 3px rgba(0,0,0,0.15);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 40px;
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            border-radius: 12px;
            overflow: hidden;
            table-layout: fixed; /* Ayuda a controlar el ancho de las celdas */
        }
        th {
            background: #0B1A33;
            color: white;
            padding: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #e6e9ef;
            font-size: 15px;
            vertical-align: top;
        }
        input, textarea {
            border: 1px solid #ddd;
            padding: 8px;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: inherit;
        }
        /* Estilo para que la descripción sea expandible */
        textarea.description {
            width: 100%;
            resize: none;
            overflow: hidden;
            min-height: 38px;
            display: block;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #0B1A33;
            box-shadow: 0 0 5px rgba(11, 26, 51, 0.3);
        }
        .button-row {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            margin-top: 20px;
        }
        .row-button {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .add-button { background-color: #0B1A33; color: white; }
        .remove-button { background-color: #d32f2f; color: white; }
        .print-button {
            background-color: #2e7d32;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .totals {
            margin-top: 30px;
            font-size: 20px;
            text-align: right;
            font-weight: 700;
            color: #0B1A33;
        }
        .footer {
            margin-top: 70px;
            display: flex;
            justify-content: space-between;
        }
        .accept-box {
            width: 45%;
            border-top: 3px solid #0B1A33;
            padding-top: 15px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
        }
        .delete-cell { width: 50px; text-align: center; }
        .delete-btn {
            background: none; border: none; color: #d32f2f;
            font-size: 20px; font-weight: bold; cursor: pointer;
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* Print-specific styles */
        @media print {
            body { margin: 0; padding: 20px; background: white !important; color: black !important; }
            .no-print { display: none !important; }
            table { box-shadow: none !important; border: 1px solid #ddd !important; }
            th { background: #0B1A33 !important; color: white !important; -webkit-print-color-adjust: exact; }
            
            textarea.description, input {
                border: none !important;
                padding: 0 !important;
                background: transparent !important;
                box-shadow: none !important;
                width: 100% !important;
                resize: none !important;
            }
            /* Asegura que el textarea muestre todo el contenido al imprimir */
            textarea.description {
                height: auto !important;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><img src="nodoxlogoazul.png" style="width:180px; height:auto;" /></div>
        <div class="header-info">
            <p><strong>No.:</strong> <input type="text" id="quoteNumber" value="0000" class="header-input"></p>
            <p><strong>Fecha:</strong> <input type="date" id="quoteDate" class="header-input"></p>
        </div>
    </div>
    <br>
    <h1>COTIZACIÓN</h1>
    <br>
    <p><strong>Cliente:</strong> <input type="text" id="clientName" placeholder="Nombre del Cliente" style="width: 300px;" class="client-name-input"></p>

    <table id="main-table">
        <colgroup>
            <col style="width: 50%;">
            <col style="width: 15%;">
            <col style="width: 15%;">
            <col style="width: 15%;">
            <col style="width: 5%;" class="no-print">
        </colgroup>
        <thead>
            <tr>
                <th>Descripción</th>
                <th>Cantidad</th>
                <th>Precio Unitario</th>
                <th>Total</th>
                <th class="delete-cell no-print"></th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr>
                <td><textarea class="description" placeholder="Producto o servicio" rows="1"></textarea></td>
                <td><input type="number" class="quantity" min="0" value="0"></td>
                <td><input type="number" class="unit-price" min="0" value="0.00" step="0.01"></td>
                <td class="row-total">Q 0.00</td>
                <td class="delete-cell no-print"><button class="delete-btn">×</button></td>
            </tr>
        </tbody>
    </table>

    <div class="controls-row">
        <div class="button-row no-print">
            <button class="row-button add-button" id="addRow">+</button>
        </div>
        <div class="print-button-container no-print">
            <button class="print-button" id="printBtn">Imprimir / Guardar PDF</button>
        </div>
    </div>

    <p class="totals"><strong>Total: <span id="grand-total">Q 0.00</span></strong></p>

    <div class="footer">
        <div class="accept-box">Aceptado por:</div>
        <div class="accept-box">Fecha de aceptación:</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tableBody = document.getElementById('table-body');

            // Ajustar altura de textarea automáticamente
            function autoResize(textarea) {
                textarea.style.height = 'auto';
                textarea.style.height = textarea.scrollHeight + 'px';
            }

            function calculateGrandTotal() {
                let grandTotal = 0;
                document.querySelectorAll('#table-body tr').forEach(row => {
                    const qty = parseFloat(row.querySelector('.quantity').value) || 0;
                    const price = parseFloat(row.querySelector('.unit-price').value) || 0;
                    const total = qty * price;
                    row.querySelector('.row-total').textContent = `Q ${total.toFixed(2)}`;
                    grandTotal += total;
                });
                document.getElementById('grand-total').textContent = `Q ${grandTotal.toFixed(2)}`;
            }

            function initRowEvents(row) {
                const area = row.querySelector('.description');
                area.addEventListener('input', () => autoResize(area));
                
                row.querySelector('.quantity').addEventListener('input', calculateGrandTotal);
                row.querySelector('.unit-price').addEventListener('input', calculateGrandTotal);
                
                row.querySelector('.delete-btn').addEventListener('click', () => {
                    if (document.querySelectorAll('#table-body tr').length > 1) {
                        row.remove();
                        calculateGrandTotal();
                    }
                });
            }

            document.getElementById('addRow').addEventListener('click', () => {
                const newRow = document.createElement('tr');
                newRow.innerHTML = `
                    <td><textarea class="description" placeholder="Producto o servicio" rows="1"></textarea></td>
                    <td><input type="number" class="quantity" min="0" value="0"></td>
                    <td><input type="number" class="unit-price" min="0" value="0.00" step="0.01"></td>
                    <td class="row-total">Q 0.00</td>
                    <td class="delete-cell no-print"><button class="delete-btn">×</button></td>
                `;
                tableBody.appendChild(newRow);
                initRowEvents(newRow);
            });

            document.getElementById('printBtn').addEventListener('click', () => {
                // Ajustar todos los textareas antes de imprimir
                document.querySelectorAll('textarea.description').forEach(autoResize);
                window.print();
            });

            // Inicializar filas existentes
            document.querySelectorAll('#table-body tr').forEach(initRowEvents);
            document.getElementById('quoteDate').value = new Date().toISOString().split('T')[0];
        });
    </script>
</body>
</html>
