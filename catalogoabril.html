<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Creador Catalogo Nodox Milkinientos</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root { 
            --nodox-black: #000000;
            --nodox-red: #E31D2B;
            --nodox-gray-bg: #F4F4F7;
            --ws-green: #25D366;
        }
        
        * { box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; background: var(--nodox-gray-bg); color: #333; }
        
        /* Panel de Control */
        .no-print-zone { 
            background: white; padding: 20px; border-bottom: 4px solid var(--nodox-red); 
            text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .btn { padding: 12px 28px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 5px; font-size: 13px; transition: 0.3s; }
        .btn-upload { background: var(--nodox-black); color: white; }
        .btn-print { background: var(--nodox-red); color: white; }

        #catalog-container { display: flex; flex-direction: column; align-items: center; padding: 30px 0; }
        
        /* Hoja Tamaño Carta */
        .pdf-page { 
            width: 210mm; height: 279mm; padding: 12mm; background: white; 
            display: flex; flex-direction: column; position: relative; 
            margin-bottom: 40px; box-shadow: 0 0 20px rgba(0,0,0,0.15);
            page-break-after: always;
        }

        /* CARÁTULA LIMPIA */
        .separator-page { padding: 0 !important; justify-content: center; align-items: center; background: var(--nodox-black); }
        .separator-img { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.8; display: none; }
        .separator-content { 
            position: relative; z-index: 2; color: white; text-align: center; 
            padding: 40px; border-radius: 15px; 
            width: 85%; border: 2px solid var(--nodox-red); 
            min-height: 100px; display: flex; align-items: center; justify-content: center;
        }

        .page-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--nodox-black); padding-bottom: 10px; margin-bottom: 15px; }
        .nodox-logo-container { height: 50px; }
        .nodox-logo-container img { height: 100%; }

        /* Grid 6 Productos */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr); gap: 15px; flex-grow: 1; }
        .card { border: 1px solid #ddd; border-radius: 8px; display: flex; flex-direction: column; background: #fff; padding: 12px; max-height: 75mm; }
        
        .card-image-container { 
            width: 100%; height: 85px; background: #F9F9F9; margin-bottom: 10px; 
            display: flex; align-items: center; justify-content: center; border: 1px solid #eee; position: relative; 
        }
        .card-image-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .image-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; z-index: 10; font-size: 11px; gap: 8px; }
        .card-image-container:hover .image-overlay, .separator-page:hover .image-overlay { opacity: 1; }
        .overlay-btn { background: #444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; }

        .card-title { font-size: 11.5px; font-weight: bold; margin-bottom: 4px; text-transform: uppercase; line-height: 1.2; height: 2.4em; overflow: hidden; color: var(--nodox-black); }
        .card-sku { font-size: 10px; color: #555; font-weight: bold; background: #eee; padding: 2px 4px; border-radius: 3px; }
        .card-specs { font-size: 9.5px; color: #444; line-height: 1.3; border-top: 1px solid #eee; padding-top: 8px; margin-top: 8px; flex-grow: 1; overflow: hidden; }
        
        /* PIE DE PÁGINA CON COLOR FORZADO */
        .page-footer { border-top: 1px solid #eee; padding-top: 10px; margin-top: auto; display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: #777; }
        .ws-link { 
            background-color: var(--ws-green) !important; 
            color: white !important; 
            padding: 6px 15px; 
            border-radius: 20px; 
            text-decoration: none; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            gap: 5px;
            -webkit-print-color-adjust: exact; /* Fuerza color en PDF */
            print-color-adjust: exact;
        }

        [contenteditable="true"]:focus { outline: 2px solid var(--nodox-red); background: #fffde7; }

        @media print {
            @page { size: letter; margin: 0; }
            body { background: white; }
            .no-print-zone, .image-overlay { display: none !important; }
            #catalog-container { width: 100%; padding: 0; }
            .pdf-page { margin: 0; box-shadow: none; border: none; width: 100%; height: 100vh; padding: 12mm; }
            .ws-link { background-color: #25D366 !important; color: white !important; }
        }
    </style>
</head>
<body>

<div class="no-print-zone">
    <h1 style="margin:0">NODOX MASTER <span style="color:var(--nodox-red)">ELITE</span></h1>
    <input type="file" id="csv-input" accept=".csv" style="display:none" onchange="handleCSV(this)">
    <button class="btn btn-upload" onclick="document.getElementById('csv-input').click()">📁 1. Cargar CSV</button>
    <button id="print-btn" class="btn btn-print" onclick="window.print()" style="display:none;">🖨️ 2. Guardar PDF (Tamaño Carta)</button>
</div>

<div id="catalog-container"></div>

<script>
    const WHATSAPP_NUMBER = "50245917700";
    const LOGO = "logotipoNodox.png";
    let sectionIdx = 0;

    function handleCSV(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            const clean = e.target.result.split(/\r?\n/).slice(2).join('\n');
            Papa.parse(clean, {
                header: true, delimiter: "\t", skipEmptyLines: true,
                complete: res => {
                    if(res.data.length) {
                        addSection(res.data);
                        document.getElementById('print-btn').style.display = 'inline-block';
                    }
                }
            });
        };
        reader.readAsText(file);
        input.value = "";
    }

    function addSection(data) {
        const container = document.getElementById('catalog-container');
        sectionIdx++;
        
        const sep = document.createElement('div');
        sep.className = 'pdf-page separator-page';
        const sid = `s-${sectionIdx}`;
        // Carátula ahora viene vacía de texto automático
        sep.innerHTML = `
            <img id="${sid}" class="separator-img">
            <div class="separator-content" id="box-${sid}" contenteditable="true">
                <span id="guide-${sid}">Haz clic para escribir título o carga imagen...</span>
            </div>
            <div class="image-overlay">
                <button class="overlay-btn" onclick="loadImg('${sid}', true)">Link URL</button>
                <button class="overlay-btn" onclick="document.getElementById('f-${sid}').click()">Subir Archivo</button>
            </div>
            <input type="file" id="f-${sid}" hidden onchange="upImg(this,'${sid}',true)">`;
        container.appendChild(sep);

        const per = 6;
        for (let i = 0; i < Math.ceil(data.length / per); i++) {
            const page = document.createElement('div');
            page.className = 'pdf-page';
            page.innerHTML = `
                <div class="page-header">
                    <div class="nodox-logo-container"><img src="${LOGO}" onerror="this.src='https://via.placeholder.com/150x50?text=NODOX'"></div>
                    <div style="text-align:right; font-size:10px;"><strong>CATÁLOGO CORPORATIVO</strong></div>
                </div>
            `;
            const grid = document.createElement('div');
            grid.className = 'product-grid';
            data.slice(i * per, (i + 1) * per).forEach((p, idx) => {
                const id = `img-${sectionIdx}-${i}-${idx}`;
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-image-container">
                            <img id="${id}" style="display:none;">
                            <span id="txt-${id}" style="font-size:10px;color:#bbb">Imagen Producto</span>
                            <div class="image-overlay">
                                <button class="overlay-btn" onclick="loadImg('${id}', false)">URL</button>
                                <button class="overlay-btn" onclick="document.getElementById('f-${id}').click()">FILE</button>
                            </div>
                            <input type="file" id="f-${id}" hidden onchange="upImg(this,'${id}',false)">
                        </div>
                        <div class="card-title" contenteditable="true">${(p.Nombre||'').split(' - ')[0]}</div>
                        <div><span class="card-sku" contenteditable="true">SKU: ${p.SKU||'--'}</span></div>
                        <div class="card-specs" contenteditable="true">${(p.Atributos||'').split('-').join(' • ')}</div>
                    </div>`;
            });
            page.appendChild(grid);
            page.innerHTML += `
                <div class="page-footer">
                    <span>NODOX | Guatemala 2026</span>
                    <a href="https://wa.me/${WHATSAPP_NUMBER}" class="ws-link" target="_blank">📱 wa.me/${WHATSAPP_NUMBER}</a>
                </div>`;
            container.appendChild(page);
        }
    }

    function loadImg(id, isSeparator) {
        const url = prompt("Link de la imagen:");
        if(url) { 
            const img = document.getElementById(id);
            img.src = url; 
            img.onload = () => {
                img.style.display="block"; 
                if(isSeparator) {
                    document.getElementById('box-'+id).style.display = "none";
                } else {
                    document.getElementById('txt-'+id).style.display = "none";
                }
            };
        }
    }

    function upImg(input, id, isSeparator) {
        if (input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const res = document.getElementById(id);
                res.src = e.target.result;
                res.style.display = "block";
                if(isSeparator) {
                    document.getElementById('box-'+id).style.display = "none";
                } else {
                    document.getElementById('txt-'+id).style.display = "none";
                }
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
